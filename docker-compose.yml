x-app-hosts: &app-hosts
  # spiski.gpmu.org есть не во всех публичных DNS; без записи sync GPMU падает в Docker.
    extra_hosts:
    - "spiski.gpmu.org:${GPMU_FALLBACK_IP:-89.169.170.237}"

services:
  web:
    <<: *app-hosts
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app
      - ./apps/users/migrations:/app/apps/users/migrations
      - ./apps/universities/migrations:/app/apps/universities/migrations
      - ./apps/admissions/migrations:/app/apps/admissions/migrations
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis

  celery:
    <<: *app-hosts
    build: .
    entrypoint: ["/bin/bash", "/app/entrypoint-worker.sh"]
    command: celery -A config worker -l info --concurrency=1
    volumes:
      - .:/app
      - ./apps/users/migrations:/app/apps/users/migrations
      - ./apps/universities/migrations:/app/apps/universities/migrations
      - ./apps/admissions/migrations:/app/apps/admissions/migrations
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - web

  celery-beat:
    <<: *app-hosts
    build: .
    entrypoint: ["/bin/bash", "/app/entrypoint-worker.sh"]
    command: celery -A config beat -l info
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - web

  redis:
    image: redis:7-alpine

volumes:
  sqlite_data:
